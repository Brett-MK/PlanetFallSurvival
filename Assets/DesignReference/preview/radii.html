<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--space-void); color: var(--fg-1); font: var(--type-body); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .r { aspect-ratio: 1; background: var(--grad-panel-raised); border: var(--border-panel); display: grid; place-items: end; padding: 6px; }
  .r .lbl { font: 600 9px/1 var(--font-mono); color: var(--fg-3); }
  .r-xs { border-radius: 4px; }
  .r-sm { border-radius: 8px; }
  .r-md { border-radius: 12px; }
  .r-lg { border-radius: 16px; }
  .r-xl { border-radius: 22px; }
  .r-pill { border-radius: 999px; }
</style></head>
<body>
  <div class="grid">
    <div class="r r-xs"><span class="lbl">xs · 4</span></div>
    <div class="r r-sm"><span class="lbl">sm · 8</span></div>
    <div class="r r-md"><span class="lbl">md · 12</span></div>
    <div class="r r-lg"><span class="lbl">lg · 16</span></div>
    <div class="r r-xl"><span class="lbl">xl · 22</span></div>
    <div class="r r-pill"><span class="lbl">pill</span></div>
  </div>
</body></html>
