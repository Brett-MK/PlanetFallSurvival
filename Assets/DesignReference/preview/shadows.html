<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--space-void); color: var(--fg-1); font: var(--type-body-sm); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .box { height: 90px; border-radius: 14px; display: flex; align-items: flex-end; padding: 8px 12px; font: 600 10px/1.2 var(--font-mono); color: var(--fg-2); }
  .panel { background: var(--grad-panel); border: var(--border-panel); box-shadow: var(--shadow-panel); }
  .raised { background: var(--grad-panel-raised); border: var(--border-panel); box-shadow: var(--shadow-raised); }
  .gold { background: var(--grad-gold); border: 1px solid #8F4E08; box-shadow: var(--shadow-gold); color: #3A1A00; }
  .glow { background: var(--grad-panel-raised); border: var(--border-panel); box-shadow: 0 0 0 1px rgba(139,108,255,.3) inset, 0 0 24px rgba(139,108,255,.55); }
</style></head>
<body>
  <div class="row">
    <div class="box panel">panel · inset + drop</div>
    <div class="box raised">raised · bevel</div>
    <div class="box gold">gold · chiseled</div>
    <div class="box glow">glow · beam halo</div>
  </div>
</body></html>
