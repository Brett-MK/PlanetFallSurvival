<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../ui_kits/mobile/styles.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--space-void); display: flex; gap: 22px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .lbl { font: 600 10px var(--font-ui); letter-spacing: .08em; text-transform: uppercase; color: var(--fg-3); }
  .b { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 20px; border-radius: 10px; border: 1.5px solid #0A0618; color: #fff; font: 700 11px/1 var(--font-ui); background: linear-gradient(180deg,#FF7A8C,#D9253E); box-shadow: var(--glow-danger); }
  .iconwrap { width: 44px; height: 44px; display: grid; place-items: center; background: var(--grad-panel-raised); border: var(--border-panel); border-radius: 12px; box-shadow: var(--shadow-raised); position: relative; }
</style></head>
<body>
  <div class="col"><div class="iconwrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C6B8E8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v10a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3V8Z"/><path d="M9 4a3 3 0 0 1 6 0M6 12h12"/></svg><span class="pf-badge pf-badge--corner">2</span></div><span class="lbl">count</span></div>
  <div class="col"><div class="iconwrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C6B8E8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v10a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3V8Z"/></svg><span class="pf-badge pf-badge--corner">99+</span></div><span class="lbl">overflow</span></div>
  <div class="col"><span class="b">NEW</span><span class="lbl">text</span></div>
  <div class="col"><span class="b" style="background:linear-gradient(180deg,#FFB547,#E8751C);box-shadow:var(--shadow-gold);border-color:#8F4E08;color:#3A1A00">HOT</span><span class="lbl">gold</span></div>
  <div class="col"><span class="b" style="background:linear-gradient(180deg,#A8F2C0,#2FB85F);color:#062817;box-shadow:var(--glow-energy);">•</span><span class="lbl">dot</span></div>
</body></html>
