<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../ui_kits/mobile/styles.css"/>
<style>body { margin:0; padding: 22px; background: var(--space-void); }</style></head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<div id="r"></div>
<script type="text/babel" src="../ui_kits/mobile/Icons.jsx"></script>
<script type="text/babel">
  const { Diamond, Leaf, Plus, Calendar } = window.I;
  function Chip({children, variant, hasAdd}) {
    return <div className={`pf-chip pf-chip--${variant||'default'}`}>{children}{hasAdd && <button className="pf-chip-add"><Plus size={10} color="#fff"/></button>}</div>;
  }
  ReactDOM.createRoot(document.getElementById('r')).render(
    <div style={{display:'flex', gap: 8, alignItems:'center', flexWrap:'wrap'}}>
      <div className="pf-time"><Calendar size={12} color="#8A7BB8"/><span>UTC 03/09 · 03:42:52</span></div>
      <div className="pf-vip"><span>VIP</span><span>12</span></div>
      <Chip variant="diamond" hasAdd><span className="pf-chip-icon"><Diamond size={16}/></span><span className="pf-chip-value">35,961</span></Chip>
      <Chip variant="energy" hasAdd><span className="pf-chip-icon"><Leaf size={16}/></span><span className="pf-chip-value">652M</span></Chip>
    </div>
  );
</script>
</body></html>
