<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--space-void); color: var(--fg-1); }
  .row { display: flex; align-items: baseline; gap: 18px; margin-bottom: 12px; }
  .spec { font: 500 10px/1 var(--font-mono); color: var(--fg-3); width: 180px; flex-shrink: 0; }
  .cap   { font: 700 14px/1 var(--font-ui); letter-spacing: .08em; text-transform: uppercase; }
  .cap-md { font: 600 12px/1 var(--font-ui); letter-spacing: .08em; text-transform: uppercase; color: var(--fg-2); }
  .cap-sm { font: 700 10px/1 var(--font-ui); letter-spacing: .08em; text-transform: uppercase; color: var(--fg-3); }
  .body  { font: 400 14px/1.45 var(--font-body); color: var(--fg-2); max-width: 380px; }
</style></head>
<body>
  <div class="row"><span class="spec">Rajdhani 700 · 14 · +.08em</span><span class="cap">Base · Heroes · Battle</span></div>
  <div class="row"><span class="spec">Rajdhani 600 · 12 · +.08em</span><span class="cap-md">Combat Power</span></div>
  <div class="row"><span class="spec">Rajdhani 700 · 10 · +.08em</span><span class="cap-sm">Nav Labels</span></div>
  <div class="row"><span class="spec">Inter 400 · 14</span><span class="body">Commander, your outpost is low on bio-energy. Deploy a scout team to the north ridge.</span></div>
</body></html>
