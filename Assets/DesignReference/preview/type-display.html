<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--space-void); color: var(--fg-1); }
  .row { display: flex; align-items: baseline; gap: 18px; margin-bottom: 14px; }
  .spec { font: 500 10px/1 var(--font-mono); color: var(--fg-3); width: 180px; flex-shrink: 0; }
  .sample.stat-lg { font: 800 32px/1 var(--font-display); color: var(--gold-1); letter-spacing: -.01em; }
  .sample.stat-md { font: 700 20px/1 var(--font-display); color: var(--fg-1); }
  .sample.num    { font: 700 24px/1 var(--font-display); color: var(--fg-1); }
</style></head>
<body>
  <div class="row"><span class="spec">Orbitron 800 · 32 · tight</span><span class="sample stat-lg">813,126,736</span></div>
  <div class="row"><span class="spec">Orbitron 700 · 24</span><span class="sample num">35,961</span></div>
  <div class="row"><span class="spec">Orbitron 700 · 20</span><span class="sample stat-md">652M</span></div>
  <div class="row"><span class="spec">Orbitron 600 · 13</span><span class="sample" style="font:600 13px var(--font-display); color:var(--fg-2)">LVL 42 · VIP 12</span></div>
</body></html>
